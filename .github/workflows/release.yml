name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_ext: tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_ext: zip
          - os: macos-latest
            goos: darwin
            goarch: amd64
            asset_ext: zip
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Verify
        run: node scripts/verify.mjs

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install jq
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get install -y jq; fi
          if [ "$RUNNER_OS" = "macOS" ]; then brew install jq; fi
          if [ "$RUNNER_OS" = "Windows" ]; then choco install jq -y; fi
        shell: bash

      - name: Inject version into wails.json
        shell: bash
        env:
          VER: ${{ github.ref_name }}
        run: |
          jq --arg v "$VER" '.info.productVersion = $v' wails.json > wails.json.tmp && mv wails.json.tmp wails.json

      - name: Build
        shell: bash
        env:
          VER: ${{ github.ref_name }}
        run: |
          build_tags=""
          if [ "${{ matrix.goos }}" = "linux" ]; then
            build_tags="webkit2_41"
          fi
          wails build -clean -tags "$build_tags" -platform ${{ matrix.goos }}/${{ matrix.goarch }} -ldflags "-X main.AppVersion=$VER"

      - name: Package artifact
        id: package
        shell: bash
        env:
          VER: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          asset_name="koalapull-${VER}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.asset_ext }}"

          mkdir -p build/bin/KoalaPull
          cp README_PORTABLE.txt build/bin/KoalaPull/README.txt

          if [ "${{ matrix.goos }}" = "darwin" ]; then
            artifact_path="release-assets/${asset_name}"
            cp -r build/bin/koalapull.app build/bin/KoalaPull/
            ditto -c -k --sequesterRsrc --keepParent build/bin/KoalaPull "$artifact_path"
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            artifact_path="release-assets/${asset_name}"
            cp build/bin/koalapull.exe build/bin/KoalaPull/
            powershell -Command "Compress-Archive -Path 'build/bin/KoalaPull' -DestinationPath '$artifact_path'"
          else
            artifact_path="release-assets/${asset_name}"
            cp build/bin/koalapull build/bin/KoalaPull/
            tar -czf "$artifact_path" -C build/bin KoalaPull
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            (cd release-assets && sha256sum "$asset_name" > "$asset_name.sha256")
          else
            (cd release-assets && shasum -a 256 "$asset_name" > "$asset_name.sha256")
          fi
          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Upload action artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: koalapull-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release-assets/*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: release-assets
          pattern: koalapull-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: release-assets/*
