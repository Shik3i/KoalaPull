name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify
        run: ./scripts/verify.sh

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install jq
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get install -y jq; fi
          if [ "$RUNNER_OS" = "macOS" ]; then brew install jq; fi
          if [ "$RUNNER_OS" = "Windows" ]; then choco install jq -y; fi
        shell: bash

      - name: Inject version into wails.json
        run: |
          VER="${{ github.ref_name }}"
          jq --arg v "$VER" '.info.productVersion = $v' wails.json > wails.json.tmp && mv wails.json.tmp wails.json

      - name: Build
        run: wails build -clean -platform ${{ matrix.goos }}/${{ matrix.goarch }} -ldflags "-X main.AppVersion=${{ github.ref_name }}"

      - name: Upload binaries
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: build/bin/*
