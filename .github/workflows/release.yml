name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_ext: tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_ext: zip
          - os: macos-latest
            goos: darwin
            goarch: amd64
            asset_ext: zip
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Verify
        run: ./scripts/verify.sh

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install jq
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get install -y jq; fi
          if [ "$RUNNER_OS" = "macOS" ]; then brew install jq; fi
          if [ "$RUNNER_OS" = "Windows" ]; then choco install jq -y; fi
        shell: bash

      - name: Inject version into wails.json
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          jq --arg v "$VER" '.info.productVersion = $v' wails.json > wails.json.tmp && mv wails.json.tmp wails.json

      - name: Build
        shell: bash
        run: |
          build_tags=""
          if [ "${{ matrix.goos }}" = "linux" ]; then
            build_tags="webkit2_41"
          fi
          wails build -clean -tags "$build_tags" -platform ${{ matrix.goos }}/${{ matrix.goarch }} -ldflags "-X main.AppVersion=${{ github.ref_name }}"

      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          asset_name="koalapull-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.asset_ext }}"

          mkdir -p build/bin/KoalaPull
          cp README_PORTABLE.txt build/bin/KoalaPull/README.txt

          if [ "${{ matrix.goos }}" = "darwin" ]; then
            artifact_path="release-assets/${asset_name}"
            cp -r build/bin/koalapull.app build/bin/KoalaPull/
            ditto -c -k --sequesterRsrc --keepParent build/bin/KoalaPull "$artifact_path"
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            artifact_path="release-assets/${asset_name}"
            cp build/bin/koalapull.exe build/bin/KoalaPull/
            powershell -Command "Compress-Archive -Path 'build/bin/KoalaPull' -DestinationPath '$artifact_path'"
          else
            artifact_path="release-assets/${asset_name}"
            cp build/bin/koalapull build/bin/KoalaPull/
            tar -czf "$artifact_path" -C build/bin KoalaPull
          fi

          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Upload action artifact
        uses: actions/upload-artifact@v4
        with:
          name: koalapull-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.artifact_path }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: koalapull-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
